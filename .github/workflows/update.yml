name: Update events
on:
  schedule:
    - cron: '17 * * * *'      # hourly, at :17
  workflow_dispatch: {}        # manual trigger
  push: { branches: [main] }   # rebuild on deploy
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci || npm install
      - name: Collect events
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}            # optional — Ticketmaster Discovery
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}  # optional — SeatGeek
          BIT_APP_ID: ${{ secrets.BIT_APP_ID }}            # optional — Bandsintown
          REDDIT_UA: 'SoCalEventRadar/1.0 (personal)'      # CI IPs are usually fine for reddit
        run: npm run collect
      - name: Commit refreshed data
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add public/*.json
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%FT%TZ)"
          git push
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: '${{ steps.deployment.outputs.page_url }}' }
    steps:
      - uses: actions/checkout@v4
        with: { ref: main }
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: 'public' }
      - id: deployment
        uses: actions/deploy-pages@v4
