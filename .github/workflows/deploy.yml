name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Restore scene_graph.json
        if: ${{ env.SCENE_GRAPH_JSON != '' }}
        run: echo "$SCENE_GRAPH_JSON" > data/scene_graph.json
        env:
          SCENE_GRAPH_JSON: ${{ secrets.SCENE_GRAPH_JSON }}

      - run: npm run collect
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          BIT_APP_ID: ${{ secrets.BIT_APP_ID }}

      - run: npm run validate

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
