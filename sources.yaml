# SoCal Event Radar — source registry
# tiers:  A=real API  B=static HTML/RSS/ICS  C=JS-app/best-effort  D=manual/social
# status: active=parser implemented & pulling   key=works when API key added
#         degraded=blocks datacenter IPs (works from residential/CI)   watch=manual/social only
# Non-active rows are exported to public/sources.json as planned, best_effort, or manual.
# Add a source: drop it here, then add/extend a parser in collector/parsers/ and register it in collect.js.

active_parsers:            # these run in `npm run collect` today
  - { name: 19hz,              tier: B, type: html,    status: active,   region: SoCal, url: "https://19hz.info/eventlisting_LosAngeles.php", note: "Backbone. ~500 events, densest underground-aware source." }
  - { name: Eventbrite,        tier: C, type: html,    status: active,   region: SoCal, url: "https://www.eventbrite.com/d/ca--los-angeles/", note: "General: pop-ups, workshops, networking, art, markets, community, free events." }
  - { name: lu.ma,             tier: C, type: html,    status: active,   region: LA,    url: "https://lu.ma/los-angeles", note: "Tech/startup/creative/professional/social mixers — high signal for career + meeting people." }
  - { name: Libraries,         tier: B, type: html,    status: active,   region: SoCal, url: "https://visit.lacountylibrary.org/events + lapl.org", note: "Wholesome, free, community, workshops, talks, Silver Lake / local branch events." }
  - { name: Resident Advisor,  tier: C, type: graphql, status: active,   region: LA,    url: "https://ra.co/events/us/losangeles", note: "Area 23. Auto-captures most collectives (Hood Rave, Sirens, Perfect Dark, Por Detroit, Observe, Respect DnB, WORK...)." }
  - { name: EDM Calendars,     tier: B, type: html,    status: active,   region: SoCal, url: "https://edmcalendar.com/edm-event-calendar/southern-california/", note: "edmcalendar + electronicmidwest festival rows (best-effort)." }
  - { name: Editorial RSS,     tier: B, type: rss,     status: active,   region: LA,    url: "https://ravenewworld.substack.com/feed", note: "Rave New World intel; add more /feed/ urls in parsers/rss.js." }
  - { name: Ticketmaster,      tier: A, type: api,     status: key,      region: SoCal, url: "https://app.ticketmaster.com/discovery/v2/", note: "Free TM_API_KEY. Covers TM + TicketWeb + Universe + FrontGate + TMR. DMA 324 (LA) + 825 (SD)." }
  - { name: SeatGeek,          tier: A, type: api,     status: key,      region: SoCal, url: "https://platform.seatgeek.com/", note: "Free SEATGEEK_CLIENT_ID. Concerts by city; includes coords." }
  - { name: Bandsintown,       tier: A, type: api,     status: key,      region: SoCal, url: "https://rest.bandsintown.com/", note: "Free BIT_APP_ID. Tracks your DJ watchlist in data/artists.json." }
  - { name: Tixr,              tier: C, type: spa,     status: degraded, region: SoCal, url: "https://www.tixr.com/", note: "Exchange/Academy/Avalon/Time/Nova/Day Trip groups. 403s datacenter IPs; works residential/CI." }
  - { name: r/avesLA,          tier: B, type: rss,     status: degraded, region: SoCal, url: "https://www.reddit.com/r/avesLA/", note: "Reddit blocks datacenter IPs; CI/residential OK." }
  - { name: Manual,            tier: D, type: manual,  status: active,   region: SoCal, url: "data/manual_events.json", note: "Hand-entered IG/Discord/SMS/flyer drops." }
  - { name: Partiful,          tier: C, type: html,    status: best_effort, region: SoCal, url: "https://partiful.com/", note: "Public Partiful pages only. Re-checks manual Partiful URLs." }
  - { name: DICE,              tier: C, type: html,    status: best_effort, region: SoCal, url: "https://dice.fm/browse/los-angeles", note: "LA electronic/underground events on DICE." }

